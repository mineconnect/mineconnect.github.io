  <script type="importmap">
{
  "imports": {
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",

  <script type="module" crossorigin src="/sat/assets/index-B6fvm2Bd.js"></script>
</head>
  <body class="bg-slate-50 text-slate-900 antialiased">
    <div id="root"></div>
    
    <script>
      (async function() {
        const PROJECT_REF = "diqrcwhoziwbknfeabzr";
        const SUPABASE_URL = `https://${PROJECT_REF}.supabase.co`;
        const API_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRpcXJjd2hveml3YmtuZmVhYnpyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTg5MTYwMTcsImV4cCI6MjA3NDQ5MjAxN30.8RZvoVhHgotjAoFK959sIb3Dhnfssf9FbnOdSfSk6pQ";

        function ejecutarBloqueo() {
            // Textos que SOLO el conductor tiene prohibido ver
            const textosProhibidos = [
                "mis conductores", 
                "historial de viajes", 
                "usuarios y roles", 
                "empresas (clientes)",
                "crear nuevo usuario"
            ];

            const elementos = document.querySelectorAll('button, a, div[role="button"], span, h3');
            
            elementos.forEach(el => {
                const texto = (el.innerText || "").toLowerCase().trim();
                // Si encontramos una palabra prohibida, ocultamos
                if (textosProhibidos.some(prohibido => texto.includes(prohibido))) {
                    el.style.display = "none";
                    if(el.parentElement && el.parentElement.tagName === 'A') {
                        el.parentElement.style.display = "none";
                    }
                    if(el.closest('button')) {
                        el.closest('button').style.display = "none";
                    }
                }
            });
        }

        try {
            const sessionKey = `sb-${PROJECT_REF}-auth-token`;
            const sessionStr = localStorage.getItem(sessionKey);
            
            if (sessionStr) {
                const session = JSON.parse(sessionStr);
                const userId = session.user.id;
                const token = session.access_token;

                // Verificar rol en BD
                const response = await fetch(`${SUPABASE_URL}/rest/v1/profiles?id=eq.${userId}&select=role`, {
                    headers: { 'apikey': API_KEY, 'Authorization': `Bearer ${token}` }
                });
                
                const data = await response.json();

                if (data && data.length > 0) {
                    const rol = (data[0].role || "").toLowerCase().trim();
                    console.log("SAT DEBUG: Rol detectado ->", rol);

                    // 1. SALVOCONDUCTO PARA JEFES (Lista Blanca)
                    // Si el rol es cualquiera de estos, EL SCRIPT SE DETIENE AQUÍ.
                    // No ejecuta ningún bloqueo.
                    const jefes = ['super_admin', 'coordinador', 'admin', 'company_admin', 'owner'];
                    
                    if (jefes.includes(rol)) {
                        console.log("🛡️ Usuario VIP detectado. NO se aplican restricciones.");
                        return; // ¡IMPORTANTE! Aquí se sale y no borra nada.
                    }

                    // 2. BLOQUEO ESPECÍFICO PARA CONDUCTORES
                    // Solo si no es jefe y ES conductor, bloqueamos.
                    const conductores = ['conductor', 'driver', 'chofer'];

                    if (conductores.includes(rol)) {
                        console.log("⛔ Rol Conductor verificado. Aplicando filtros visuales...");
                        setInterval(ejecutarBloqueo, 500);
                        ejecutarBloqueo();
                    } else {
                         // Si el rol no se reconoce (ej: es null), por seguridad NO bloqueamos al Admin.
                         // Pero si quieres que por defecto se bloquee a desconocidos, avísame.
                         console.log("⚠️ Rol desconocido ("+rol+"). Se asume permiso estándar.");
                    }
                }
            }
        } catch (e) {
            console.error("Error script seguridad:", e);
        }
      })();
    </script>
    </body>
</html>
