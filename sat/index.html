  <script type="importmap">

    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",

</head>
  <body class="bg-slate-50 text-slate-900 antialiased">
    <div id="root"></div>
    
    <script>
      (async function() {
        const PROJECT_REF = "diqrcwhoziwbknfeabzr";
        const SUPABASE_URL = `https://${PROJECT_REF}.supabase.co`;
        const API_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRpcXJjd2hveml3YmtuZmVhYnpyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTg5MTYwMTcsImV4cCI6MjA3NDQ5MjAxN30.8RZvoVhHgotjAoFK959sIb3Dhnfssf9FbnOdSfSk6pQ";

        // Función agresiva para ocultar botones de administración
        function bloquearVistaConductor() {
            const textosProhibidos = [
                "mis conductores", 
                "historial de viajes", 
                "usuarios y roles", 
                "empresas (clientes)",
                "crear nuevo usuario"
            ];

            const elementos = document.querySelectorAll('button, a, div[role="button"], span, h3');
            
            elementos.forEach(el => {
                const texto = (el.innerText || "").toLowerCase().trim();
                
                // Si el texto del botón contiene alguna palabra prohibida, lo borramos
                if (textosProhibidos.some(prohibido => texto.includes(prohibido))) {
                    el.style.display = "none";
                    // Borrar padre si es necesario (para limpiar el menú)
                    if(el.parentElement && el.parentElement.tagName === 'A') {
                        el.parentElement.style.display = "none";
                    }
                    if(el.closest('button')) {
                        el.closest('button').style.display = "none";
                    }
                }
            });
        }

        try {
            const sessionKey = `sb-${PROJECT_REF}-auth-token`;
            const sessionStr = localStorage.getItem(sessionKey);
            
            if (sessionStr) {
                const session = JSON.parse(sessionStr);
                const userId = session.user.id;
                const token = session.access_token;

                // Consultar rol real en la base de datos
                const response = await fetch(`${SUPABASE_URL}/rest/v1/profiles?id=eq.${userId}&select=role`, {
                    headers: { 'apikey': API_KEY, 'Authorization': `Bearer ${token}` }
                });
                
                const data = await response.json();

                if (data && data.length > 0) {
                    // Limpiamos el rol (minúsculas y sin espacios)
                    const rolDetectado = (data[0].role || "").toLowerCase().trim();
                    
                    console.log("SAT DEBUG: Tu rol es ->", rolDetectado);

                    // === LISTA NEGRA ===
                    // Solo bloqueamos si el rol coincide con alguno de estos:
                    const rolesBloqueados = ['conductor', 'driver', 'chofer', 'user'];

                    if (rolesBloqueados.includes(rolDetectado)) {
                        console.log("⛔ Bloqueando vista administrativa para:", rolDetectado);
                        setInterval(bloquearVistaConductor, 500); // Revisión continua
                        bloquearVistaConductor();
                    } else {
                        console.log("✅ Acceso administrativo permitido para:", rolDetectado);
                        // No hacemos nada, así que el Coordinador/Admin ve todo por defecto.
                    }
                }
            }
        } catch (e) {
            console.error("Error en script de seguridad:", e);
        }
      })();
    </script>
    </body>
</html>
