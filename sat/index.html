  <body class="bg-slate-50 text-slate-900 antialiased">
    <div id="root"></div>
    
    <script>
      (async function() {
        const PROJECT_REF = "diqrcwhoziwbknfeabzr";
        const SUPABASE_URL = `https://${PROJECT_REF}.supabase.co`;
        const API_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRpcXJjd2hveml3YmtuZmVhYnpyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTg5MTYwMTcsImV4cCI6MjA3NDQ5MjAxN30.8RZvoVhHgotjAoFK959sIb3Dhnfssf9FbnOdSfSk6pQ";

        // Función que borra los botones (SOLO se activará si es conductor)
        function aplicarRestriccionesConductor() {
            // Buscamos botones, enlaces y divs que actúan como botones
            const elementos = document.querySelectorAll('button, a, div[role="button"], span');
            
            elementos.forEach(el => {
                const texto = (el.innerText || "").toLowerCase().trim();
                
                // Lista exacta de lo que NO debe ver el conductor
                if (texto.includes("mis conductores") || 
                    texto.includes("historial de viajes") || 
                    texto === "usuarios y roles" ||
                    texto === "empresas (clientes)") {
                    
                    el.style.display = "none"; // Ocultar elemento
                    
                    // Ocultar también el contenedor padre si es un enlace de menú
                    if(el.parentElement && el.parentElement.tagName === 'A') {
                        el.parentElement.style.display = "none";
                    }
                    // Ocultar botones contenedores
                    if(el.closest('button')) {
                        el.closest('button').style.display = "none";
                    }
                }
            });
        }

        try {
            const sessionKey = `sb-${PROJECT_REF}-auth-token`;
            const sessionStr = localStorage.getItem(sessionKey);
            
            if (sessionStr) {
                const session = JSON.parse(sessionStr);
                const userId = session.user.id;
                const token = session.access_token;

                // Consultamos el rol
                const response = await fetch(`${SUPABASE_URL}/rest/v1/profiles?id=eq.${userId}&select=role`, {
                    headers: {
                        'apikey': API_KEY,
                        'Authorization': `Bearer ${token}`
                    }
                });
                
                const data = await response.json();

                if (data && data.length > 0) {
                    const rolUsuario = (data[0].role || "").toLowerCase().trim();
                    console.log("SAT Info: Usuario conectado con rol:", rolUsuario);

                    // --- CAMBIO CLAVE AQUÍ ---
                    // Solo bloqueamos si el rol es EXPLICITAMENTE "conductor"
                    if (rolUsuario === 'conductor') {
                        console.log("👮‍♂️ Modo Conductor detectado: Aplicando restricciones visuales.");
                        // Ejecutamos varias veces para asegurar que al cargar la página se borren
                        aplicarRestriccionesConductor();
                        setInterval(aplicarRestriccionesConductor, 500);
                    } else {
                        // Si es Admin, Super Admin, Coordinador, Batman, etc., NO HACEMOS NADA.
                        console.log("✅ Modo Administrativo: Acceso total concedido.");
                    }
                }
            }
        } catch (e) {
            console.error("Error verificando usuario:", e);
        }
      })();
    </script>
    </body>
